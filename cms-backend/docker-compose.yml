version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localhost-postres
      POSTGRES_DB: d_fullstack_cms
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:localhost-postres@postgres:5432/d_fullstack_cms?schema=public
      JWT_SECRET: changeme_dev_secret
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    # Automatically run migrations on startup
    entrypoint: >
      sh -c "npx prisma migrate deploy &&
             npm run seed &&
             node dist/main"

volumes:
  postgres_data:
